<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="wc" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="0.8" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="shadow-soft">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3d2a10" flood-opacity="0.22"/>
    </filter>

    <filter id="inner-shadow">
      <feFlood flood-color="#5a3010" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="SourceGraphic" operator="in" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="2" result="blurred"/>
      <feComposite in="SourceGraphic" in2="blurred" operator="over"/>
    </filter>

    <!-- Mortar body gradient -->
    <linearGradient id="mortar-body" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#c8906a"/>
      <stop offset="25%" stop-color="#b87848"/>
      <stop offset="60%" stop-color="#9a6035"/>
      <stop offset="100%" stop-color="#6a3a18"/>
    </linearGradient>

    <!-- Mortar inner bowl -->
    <radialGradient id="mortar-inner" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7a4820" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#5a3012" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#3a1e08" stop-opacity="1"/>
    </radialGradient>

    <!-- Mortar rim -->
    <linearGradient id="mortar-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a070"/>
      <stop offset="100%" stop-color="#9a6038"/>
    </linearGradient>

    <!-- Mortar base -->
    <linearGradient id="mortar-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a5230"/>
      <stop offset="100%" stop-color="#5a3018"/>
    </linearGradient>

    <!-- Pestle gradient -->
    <linearGradient id="pestle-stick" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c89068"/>
      <stop offset="40%" stop-color="#b07845"/>
      <stop offset="100%" stop-color="#7a4820"/>
    </linearGradient>

    <radialGradient id="pestle-head" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c89068"/>
      <stop offset="55%" stop-color="#a06838"/>
      <stop offset="100%" stop-color="#6a3a18"/>
    </radialGradient>

    <!-- Shine highlights -->
    <radialGradient id="shine1" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#e8c090" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e8c090" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shine2" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f0d0a8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f0d0a8" stop-opacity="0"/>
    </radialGradient>

    <!-- Herb leaf gradients -->
    <radialGradient id="herb1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8aba72" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#3d6b2a" stop-opacity="0.68"/>
    </radialGradient>

    <radialGradient id="herb2" cx="40%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#a0ca84" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4a7835" stop-opacity="0.65"/>
    </radialGradient>

    <!-- Powder/dust in bowl -->
    <radialGradient id="powder" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c8a870" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#a88848" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#886828" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════ -->
  <!-- HERB SPRIGS sticking out -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#wc)" opacity="0.88">
    <!-- Left herb sprig -->
    <path d="M22,28 Q18,22 20,16 Q22,12 25,14 Q24,20 24,26 Z"
          fill="none" stroke="#4a7535" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round"/>
    <ellipse cx="18" cy="20" rx="5" ry="3" fill="url(#herb1)" transform="rotate(-35,18,20)"/>
    <ellipse cx="22" cy="14" rx="4.5" ry="2.8" fill="url(#herb2)" transform="rotate(-10,22,14)"/>
    <ellipse cx="26" cy="18" rx="4" ry="2.5" fill="url(#herb1)" transform="rotate(20,26,18)"/>

    <!-- Center herb sprig -->
    <path d="M40,24 Q40,16 40,10 Q40,6 40,4"
          fill="none" stroke="#4a7535" stroke-width="1.2" stroke-opacity="0.50" stroke-linecap="round"/>
    <ellipse cx="35" cy="12" rx="5" ry="2.8" fill="url(#herb2)" transform="rotate(-20,35,12)"/>
    <ellipse cx="45" cy="10" rx="4.5" ry="2.6" fill="url(#herb1)" transform="rotate(25,45,10)"/>
    <ellipse cx="38" cy="6" rx="4" ry="2.5" fill="url(#herb2)" transform="rotate(-5,38,6)"/>
    <!-- Small flower on center sprig -->
    <circle cx="40" cy="4" r="3" fill="#e8d080" opacity="0.85"/>
    <circle cx="40" cy="4" r="1.5" fill="#c9a842" opacity="0.92"/>

    <!-- Right herb sprig -->
    <path d="M58,26 Q62,20 60,14 Q58,10 55,12 Q56,18 56,24 Z"
          fill="none" stroke="#4a7535" stroke-width="1.2" stroke-opacity="0.52" stroke-linecap="round"/>
    <ellipse cx="62" cy="18" rx="5" ry="3" fill="url(#herb1)" transform="rotate(35,62,18)"/>
    <ellipse cx="58" cy="12" rx="4.5" ry="2.8" fill="url(#herb2)" transform="rotate(8,58,12)"/>
    <ellipse cx="54" cy="17" rx="4" ry="2.5" fill="url(#herb1)" transform="rotate(-22,54,17)"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- PESTLE -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#shadow-soft)">
    <!-- Pestle stick — angled -->
    <rect x="50" y="10" width="9" height="34" rx="4.5"
          fill="url(#pestle-stick)"
          transform="rotate(28, 54, 27)"/>
    <!-- Pestle shine -->
    <rect x="51" y="11" width="3.5" height="30" rx="1.75"
          fill="url(#shine2)"
          transform="rotate(28, 54, 27)"/>
    <!-- Pestle head — rounded bulb at bottom -->
    <ellipse cx="52" cy="40" rx="7" ry="8"
             fill="url(#pestle-head)"
             transform="rotate(28, 52, 40)"/>
    <ellipse cx="52" cy="40" rx="7" ry="8"
             fill="url(#shine2)"
             transform="rotate(28, 52, 40)"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- MORTAR -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#shadow-soft)">

    <!-- Mortar body — wide bowl shape -->
    <path d="M14,42 Q12,38 15,36 Q40,32 65,36 Q68,38 66,42 L60,62 Q40,68 20,62 Z"
          fill="url(#mortar-body)"/>

    <!-- Inner bowl shadow/depth -->
    <path d="M18,42 Q40,36 62,42 L58,60 Q40,65 22,60 Z"
          fill="url(#mortar-inner)" opacity="0.85"/>

    <!-- Powder/ground herbs in bowl -->
    <ellipse cx="40" cy="52" rx="17" ry="6" fill="url(#powder)"/>

    <!-- Mortar rim — top band -->
    <path d="M14,42 Q15,36 40,33 Q65,36 66,42 Q40,47 14,42 Z"
          fill="url(#mortar-rim)" opacity="0.90"/>

    <!-- Rim highlight -->
    <path d="M18,39 Q40,35 62,39" fill="none" stroke="#e0b878" stroke-width="1.2" stroke-opacity="0.40"/>

    <!-- Body texture lines -->
    <path d="M22,50 Q40,46 58,50" fill="none" stroke="#7a4020" stroke-width="0.7" stroke-opacity="0.22"/>
    <path d="M20,56 Q40,52 60,56" fill="none" stroke="#7a4020" stroke-width="0.6" stroke-opacity="0.18"/>

    <!-- Body shine -->
    <path d="M14,42 Q12,38 15,36 Q22,34 28,34 Q22,40 20,48 Q17,46 14,42 Z"
          fill="url(#shine1)" opacity="0.7"/>

    <!-- Mortar base — foot -->
    <path d="M20,62 Q40,68 60,62 L62,68 Q40,75 18,68 Z"
          fill="url(#mortar-base)"/>

    <!-- Base bottom flat -->
    <ellipse cx="40" cy="68" rx="22" ry="5" fill="#4a2810" opacity="0.82"/>
    <!-- Base highlight -->
    <path d="M22,68 Q40,64 58,68" fill="none" stroke="#8a5830" stroke-width="0.8" stroke-opacity="0.28"/>

  </g>

  <!-- ═══════════════════════════════ -->
  <!-- SCATTERED HERB BITS in bowl -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#wc)" opacity="0.60">
    <ellipse cx="32" cy="52" rx="3.5" ry="1.8" fill="#6a9848" transform="rotate(-15,32,52)"/>
    <ellipse cx="44" cy="50" rx="3" ry="1.5" fill="#5a8838" transform="rotate(20,44,50)"/>
    <ellipse cx="38" cy="56" rx="2.8" ry="1.4" fill="#7aaa58" transform="rotate(-8,38,56)"/>
    <ellipse cx="50" cy="54" rx="3" ry="1.5" fill="#6a9848" transform="rotate(30,50,54)"/>
    <ellipse cx="28" cy="55" rx="2.5" ry="1.3" fill="#5a8838" transform="rotate(-25,28,55)"/>
  </g>

  <!-- Final rim gloss -->
  <path d="M16,41 Q40,36 64,41" fill="none" stroke="#f0d8a8" stroke-width="0.8" stroke-opacity="0.30"/>
</svg>
