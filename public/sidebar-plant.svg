<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380" width="280" height="380">
  <defs>
    <!-- Watercolor filters -->
    <filter id="wc1" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="1.4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="wc2" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="1.0" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="wc-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="5" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="2.0" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="pot-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3d3020" flood-opacity="0.18"/>
    </filter>

    <!-- Leaf gradients -->
    <radialGradient id="lg1" cx="30%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#8aba72" stop-opacity="0.90"/>
      <stop offset="45%" stop-color="#6a9a52" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#3d6b2a" stop-opacity="0.65"/>
    </radialGradient>

    <radialGradient id="lg2" cx="35%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#9eca80" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#76aa5a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4a7835" stop-opacity="0.60"/>
    </radialGradient>

    <radialGradient id="lg3" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#b0d890" stop-opacity="0.80"/>
      <stop offset="55%" stop-color="#88b868" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#5a8840" stop-opacity="0.55"/>
    </radialGradient>

    <radialGradient id="lg-dark" cx="28%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#5a8840" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#2d5220" stop-opacity="0.72"/>
    </radialGradient>

    <radialGradient id="lg-mid" cx="32%" cy="42%" r="66%">
      <stop offset="0%" stop-color="#72a858" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#3d6b2a" stop-opacity="0.68"/>
    </radialGradient>

    <!-- Herb/sage leaf -->
    <radialGradient id="lg-sage" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a8c88a" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#6a9858" stop-opacity="0.58"/>
    </radialGradient>

    <!-- Pot gradients -->
    <linearGradient id="pot-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8956a"/>
      <stop offset="35%" stop-color="#b87848"/>
      <stop offset="70%" stop-color="#9a6035"/>
      <stop offset="100%" stop-color="#7a4820"/>
    </linearGradient>

    <linearGradient id="pot-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a878"/>
      <stop offset="100%" stop-color="#a86840"/>
    </linearGradient>

    <linearGradient id="pot-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a5228"/>
      <stop offset="100%" stop-color="#6a3a18"/>
    </linearGradient>

    <linearGradient id="soil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a4a28"/>
      <stop offset="100%" stop-color="#4a2e14"/>
    </linearGradient>

    <radialGradient id="pot-shine" cx="30%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#e8c090" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8c090" stop-opacity="0"/>
    </radialGradient>

    <!-- Flower gradients -->
    <radialGradient id="fl1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff4e0" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#f0e0b8" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#d8c080" stop-opacity="0.72"/>
    </radialGradient>

    <radialGradient id="fl2" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#ffe8c8" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#c8a060" stop-opacity="0.70"/>
    </radialGradient>

    <!-- Fade mask — transparent at very top so it blends with sidebar -->
    <linearGradient id="top-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="18%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="32%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="top-mask">
      <rect width="280" height="380" fill="url(#top-fade)"/>
    </mask>
  </defs>

  <g mask="url(#top-mask)">

    <!-- ═══════════════════════════════ -->
    <!-- MAIN STEMS -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc2)">
      <!-- Primary center stem -->
      <path d="M140,290 Q138,240 142,190 Q144,155 138,120 Q135,90 140,60 Q142,40 138,20"
            fill="none" stroke="#4a7535" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
      <!-- Left branch stem -->
      <path d="M140,230 Q118,210 98,185 Q80,165 65,140"
            fill="none" stroke="#4a7535" stroke-width="2.2" stroke-opacity="0.48" stroke-linecap="round"/>
      <!-- Right branch stem -->
      <path d="M140,200 Q162,178 180,155 Q198,132 212,105"
            fill="none" stroke="#4a7535" stroke-width="2.2" stroke-opacity="0.48" stroke-linecap="round"/>
      <!-- Left lower branch -->
      <path d="M140,260 Q112,248 88,232 Q70,220 55,200"
            fill="none" stroke="#5a8848" stroke-width="1.8" stroke-opacity="0.42" stroke-linecap="round"/>
      <!-- Right lower branch -->
      <path d="M140,250 Q164,236 184,218 Q200,204 215,185"
            fill="none" stroke="#5a8848" stroke-width="1.8" stroke-opacity="0.42" stroke-linecap="round"/>
      <!-- Top branch left -->
      <path d="M139,120 Q118,105 100,82 Q86,64 78,42"
            fill="none" stroke="#4a7535" stroke-width="1.8" stroke-opacity="0.42" stroke-linecap="round"/>
      <!-- Top branch right -->
      <path d="M140,110 Q158,92 172,68 Q182,50 188,28"
            fill="none" stroke="#4a7535" stroke-width="1.8" stroke-opacity="0.42" stroke-linecap="round"/>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- BACK LEAVES — large base layer -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc-soft)" opacity="0.60">
      <!-- Wide background leaves -->
      <path d="M140,270 Q80,240 45,185 Q90,190 125,220 Q138,240 140,268 Z" fill="url(#lg3)"/>
      <path d="M140,270 Q200,238 238,182 Q195,190 158,220 Q142,240 140,268 Z" fill="url(#lg3)"/>
      <path d="M140,220 Q68,185 38,130 Q85,142 118,175 Q136,198 140,218 Z" fill="url(#lg2)"/>
      <path d="M140,220 Q212,183 244,128 Q198,142 165,174 Q145,198 140,218 Z" fill="url(#lg2)"/>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- MID LEAVES -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc1)">
      <!-- Left lower leaf -->
      <path d="M132,258 Q88,245 55,202 Q58,198 65,196 Q90,205 115,232 Q130,248 133,260 Z"
            fill="url(#lg1)" opacity="0.84"/>
      <path d="M132,256 Q95,233 62,200" fill="none" stroke="#3d6b30" stroke-width="0.9" stroke-opacity="0.30"/>

      <!-- Right lower leaf -->
      <path d="M148,256 Q192,242 222,198 Q220,194 215,192 Q190,203 162,230 Q149,246 147,258 Z"
            fill="url(#lg1)" opacity="0.82"/>
      <path d="M148,254 Q185,231 220,196" fill="none" stroke="#3d6b30" stroke-width="0.9" stroke-opacity="0.30"/>

      <!-- Left mid leaf -->
      <path d="M134,230 Q82,215 52,168 Q56,164 63,163 Q90,175 116,205 Q130,220 135,232 Z"
            fill="url(#lg-mid)" opacity="0.80"/>
      <path d="M134,228 Q89,208 55,166" fill="none" stroke="#3d6b30" stroke-width="0.8" stroke-opacity="0.28"/>

      <!-- Right mid leaf -->
      <path d="M146,228 Q198,212 230,164 Q226,160 220,160 Q193,173 168,204 Q150,220 145,230 Z"
            fill="url(#lg-mid)" opacity="0.78"/>
      <path d="M146,226 Q193,206 228,162" fill="none" stroke="#3d6b30" stroke-width="0.8" stroke-opacity="0.28"/>

      <!-- Left upper branch leaf 1 -->
      <path d="M128,188 Q78,172 48,130 Q53,126 60,126 Q85,138 112,165 Q126,178 130,190 Z"
            fill="url(#lg2)" opacity="0.78"/>

      <!-- Right upper branch leaf 1 -->
      <path d="M152,186 Q202,168 234,126 Q229,122 222,123 Q198,136 172,162 Q152,178 150,188 Z"
            fill="url(#lg2)" opacity="0.76"/>

      <!-- Left upper branch leaf 2 -->
      <path d="M120,152 Q76,132 55,88 Q60,83 67,84 Q90,98 112,128 Q122,144 122,154 Z"
            fill="url(#lg-dark)" opacity="0.75"/>
      <path d="M120,150 Q80,126 58,88" fill="none" stroke="#2d5220" stroke-width="0.8" stroke-opacity="0.28"/>

      <!-- Right upper branch leaf 2 -->
      <path d="M160,150 Q204,128 226,84 Q221,79 215,81 Q192,96 168,126 Q155,143 158,152 Z"
            fill="url(#lg-dark)" opacity="0.73"/>

      <!-- Top left leaf -->
      <path d="M126,118 Q88,95 72,55 Q77,50 84,51 Q104,68 120,98 Q128,112 128,120 Z"
            fill="url(#lg1)" opacity="0.72"/>
      <path d="M126,116 Q92,90 74,54" fill="none" stroke="#3d6b30" stroke-width="0.7" stroke-opacity="0.25"/>

      <!-- Top right leaf -->
      <path d="M154,116 Q192,92 208,52 Q203,47 197,49 Q178,66 162,96 Q153,110 152,118 Z"
            fill="url(#lg1)" opacity="0.70"/>

      <!-- Center top leaf — main crown -->
      <path d="M140,95 Q118,70 115,38 Q118,32 124,32 Q132,50 138,72 Q140,85 140,96 Z"
            fill="url(#lg-dark)" opacity="0.80"/>
      <path d="M140,94 Q125,68 116,36" fill="none" stroke="#2d5220" stroke-width="0.8" stroke-opacity="0.28"/>
      <path d="M140,94 Q156,68 164,36" fill="none" stroke="#2d5220" stroke-width="0.8" stroke-opacity="0.25"/>
      <path d="M140,94 Q140,68 140,36" fill="none" stroke="#2d5220" stroke-width="0.7" stroke-opacity="0.22"/>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- HERB SPRIGS — small sage-type leaves -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc2)" opacity="0.82">
      <!-- Small paired leaves along left branch -->
      <ellipse cx="92" cy="192" rx="10" ry="6" fill="url(#lg-sage)" transform="rotate(-40,92,192)"/>
      <ellipse cx="84" cy="198" rx="9" ry="5.5" fill="url(#lg-sage)" transform="rotate(-55,84,198)"/>
      <ellipse cx="76" cy="178" rx="9" ry="5" fill="url(#lg-sage)" transform="rotate(-30,76,178)"/>

      <!-- Small paired leaves along right branch -->
      <ellipse cx="188" cy="190" rx="10" ry="6" fill="url(#lg-sage)" transform="rotate(40,188,190)"/>
      <ellipse cx="196" cy="196" rx="9" ry="5.5" fill="url(#lg-sage)" transform="rotate(55,196,196)"/>
      <ellipse cx="204" cy="176" rx="9" ry="5" fill="url(#lg-sage)" transform="rotate(30,204,176)"/>

      <!-- Upper small leaves -->
      <ellipse cx="100" cy="148" rx="8" ry="5" fill="url(#lg-sage)" transform="rotate(-45,100,148)"/>
      <ellipse cx="92" cy="140" rx="7" ry="4.5" fill="url(#lg-sage)" transform="rotate(-30,92,140)"/>
      <ellipse cx="182" cy="146" rx="8" ry="5" fill="url(#lg-sage)" transform="rotate(45,182,146)"/>
      <ellipse cx="190" cy="138" rx="7" ry="4.5" fill="url(#lg-sage)" transform="rotate(30,190,138)"/>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- FLOWERS -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc2)">
      <!-- Flower 1 — top center, open bloom -->
      <g transform="translate(140, 28)" opacity="0.88">
        <ellipse cx="0" cy="-12" rx="8" ry="13" fill="url(#fl1)" transform="rotate(0)"/>
        <ellipse cx="0" cy="-12" rx="8" ry="13" fill="url(#fl1)" opacity="0.92" transform="rotate(72)"/>
        <ellipse cx="0" cy="-12" rx="8" ry="13" fill="url(#fl1)" opacity="0.88" transform="rotate(144)"/>
        <ellipse cx="0" cy="-12" rx="8" ry="13" fill="url(#fl1)" opacity="0.90" transform="rotate(216)"/>
        <ellipse cx="0" cy="-12" rx="8" ry="13" fill="url(#fl1)" opacity="0.86" transform="rotate(288)"/>
        <circle cx="0" cy="0" r="7" fill="#c9a842" opacity="0.92"/>
        <circle cx="0" cy="0" r="4" fill="#a88830" opacity="0.96"/>
        <!-- Stamen dots -->
        <circle cx="0" cy="-3" r="1" fill="#8a6820" opacity="0.7"/>
        <circle cx="2.5" cy="1.5" r="1" fill="#8a6820" opacity="0.7"/>
        <circle cx="-2.5" cy="1.5" r="1" fill="#8a6820" opacity="0.7"/>
      </g>

      <!-- Flower 2 — left branch -->
      <g transform="translate(72, 50)" opacity="0.80">
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl2)" transform="rotate(0)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl2)" opacity="0.88" transform="rotate(60)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl2)" opacity="0.84" transform="rotate(120)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl2)" opacity="0.88" transform="rotate(180)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl2)" opacity="0.84" transform="rotate(240)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl2)" opacity="0.88" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="5.5" fill="#c9a842" opacity="0.90"/>
        <circle cx="0" cy="0" r="3" fill="#a88830" opacity="0.94"/>
      </g>

      <!-- Flower 3 — right branch -->
      <g transform="translate(208, 46)" opacity="0.78">
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl1)" transform="rotate(20)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl1)" opacity="0.86" transform="rotate(92)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl1)" opacity="0.88" transform="rotate(164)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl1)" opacity="0.84" transform="rotate(236)"/>
        <ellipse cx="0" cy="-10" rx="6.5" ry="11" fill="url(#fl1)" opacity="0.86" transform="rotate(308)"/>
        <circle cx="0" cy="0" r="5.5" fill="#c9a842" opacity="0.88"/>
        <circle cx="0" cy="0" r="3" fill="#a88830" opacity="0.92"/>
      </g>

      <!-- Small bud — left lower -->
      <g transform="translate(56, 148)" opacity="0.72">
        <path d="M0,-14 Q5,-6 4,4 Q0,8 -4,4 Q-5,-6 0,-14 Z" fill="url(#fl2)"/>
        <path d="M0,-14 Q7,-4 5,4 Q0,9 -5,4 Q-7,-4 0,-14 Z" fill="url(#fl1)" opacity="0.7" transform="rotate(40)"/>
        <circle cx="0" cy="0" r="4" fill="#c9a842" opacity="0.86"/>
      </g>

      <!-- Small bud — right lower -->
      <g transform="translate(222, 144)" opacity="0.70">
        <path d="M0,-13 Q5,-5 4,4 Q0,8 -4,4 Q-5,-5 0,-13 Z" fill="url(#fl1)"/>
        <path d="M0,-13 Q6,-3 4,4 Q0,8 -4,4 Q-6,-3 0,-13 Z" fill="url(#fl2)" opacity="0.7" transform="rotate(-40)"/>
        <circle cx="0" cy="0" r="4" fill="#c9a842" opacity="0.84"/>
      </g>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- BERRIES & DETAILS -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc2)">
      <!-- Berry cluster left -->
      <g opacity="0.72" transform="translate(98, 165)">
        <circle cx="0" cy="0" r="4" fill="#8a5828"/>
        <circle cx="7" cy="-3" r="3.5" fill="#7a4820"/>
        <circle cx="12" cy="2" r="4" fill="#8a5828"/>
        <circle cx="5" cy="-8" r="3" fill="#9a6838"/>
      </g>
      <!-- Berry cluster right -->
      <g opacity="0.68" transform="translate(162, 162)">
        <circle cx="0" cy="0" r="3.5" fill="#8a5828"/>
        <circle cx="-7" cy="-3" r="4" fill="#7a4820"/>
        <circle cx="-12" cy="2" r="3.5" fill="#8a5828"/>
        <circle cx="-4" cy="-8" r="3" fill="#9a6838"/>
      </g>

      <!-- Tendrils -->
      <path d="M115,210 Q108,204 106,212 Q104,220 112,222"
            fill="none" stroke="#4a7535" stroke-width="1" stroke-opacity="0.38" stroke-linecap="round"/>
      <path d="M165,208 Q172,202 174,210 Q176,218 168,220"
            fill="none" stroke="#4a7535" stroke-width="1" stroke-opacity="0.38" stroke-linecap="round"/>
      <path d="M106,140 Q100,134 98,142 Q96,150 104,151"
            fill="none" stroke="#5a8848" stroke-width="0.9" stroke-opacity="0.32" stroke-linecap="round"/>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- TERRACOTTA POT -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#pot-shadow)">
      <!-- Pot rim -->
      <path d="M92,295 Q140,288 188,295 L184,308 Q140,302 96,308 Z"
            fill="url(#pot-rim)" rx="3"/>
      <!-- Pot body — trapezoid -->
      <path d="M96,308 Q140,302 184,308 L178,355 Q140,362 102,355 Z"
            fill="url(#pot-body)"/>
      <!-- Pot base -->
      <rect x="106" y="355" width="68" height="10" rx="3" fill="url(#pot-base)"/>
      <!-- Pot shine/highlight -->
      <path d="M96,308 Q140,302 184,308 L178,355 Q140,362 102,355 Z"
            fill="url(#pot-shine)"/>
      <!-- Soil top -->
      <ellipse cx="140" cy="296" rx="47" ry="9" fill="url(#soil)" opacity="0.88"/>
      <!-- Soil highlight -->
      <ellipse cx="130" cy="293" rx="18" ry="4" fill="#8a6240" opacity="0.25"/>
      <!-- Pot texture lines -->
      <path d="M112,320 Q140,316 168,320" fill="none" stroke="#7a4820" stroke-width="0.7" stroke-opacity="0.22"/>
      <path d="M108,332 Q140,327 172,332" fill="none" stroke="#7a4820" stroke-width="0.7" stroke-opacity="0.18"/>
      <path d="M104,344 Q140,339 176,344" fill="none" stroke="#7a4820" stroke-width="0.6" stroke-opacity="0.15"/>
      <!-- Rim shadow -->
      <ellipse cx="140" cy="307" rx="45" ry="4" fill="#6a3a18" opacity="0.15"/>
    </g>

    <!-- ═══════════════════════════════ -->
    <!-- FRONT CRISP LEAVES (on top) -->
    <!-- ═══════════════════════════════ -->
    <g filter="url(#wc1)" opacity="0.88">
      <!-- Two front-facing leaves draping over pot rim -->
      <path d="M130,292 Q100,270 72,242 Q76,238 82,238 Q106,258 126,282 Q132,290 131,294 Z"
            fill="url(#lg-dark)" opacity="0.78"/>
      <path d="M150,290 Q180,268 208,240 Q204,236 198,237 Q174,256 154,280 Q148,289 149,292 Z"
            fill="url(#lg-dark)" opacity="0.76"/>

      <!-- Small front leaf center -->
      <path d="M140,265 Q128,250 126,228 Q130,224 135,226 Q138,246 140,264 Z"
            fill="url(#lg1)" opacity="0.82"/>
      <path d="M140,264 Q152,249 154,227 Q150,223 145,225 Q142,245 140,263 Z"
            fill="url(#lg1)" opacity="0.80"/>
    </g>

    <!-- Watercolor ambient wash -->
    <g opacity="0.08">
      <ellipse cx="140" cy="180" rx="90" ry="120" fill="#7aab6a" filter="url(#wc-soft)"/>
      <ellipse cx="100" cy="160" rx="50" ry="60" fill="#6a9a52" filter="url(#wc-soft)"/>
      <ellipse cx="180" cy="155" rx="50" ry="60" fill="#6a9a52" filter="url(#wc-soft)"/>
    </g>

  </g>
</svg>
