<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <!-- Watercolor texture filters -->
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.2" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="watercolor-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.8" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="watercolor-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="5" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="2.5" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="bloom" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Gradients for leaves -->
    <radialGradient id="leaf-g1" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#7aab6a" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#5a8c4a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3d6b30" stop-opacity="0.6"/>
    </radialGradient>

    <radialGradient id="leaf-g2" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8fba78" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6a9955" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4a7535" stop-opacity="0.55"/>
    </radialGradient>

    <radialGradient id="leaf-g3" cx="35%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#a0c888" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#78a860" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#527840" stop-opacity="0.5"/>
    </radialGradient>

    <radialGradient id="leaf-g4" cx="25%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6b9e5a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3d6b2a" stop-opacity="0.5"/>
    </radialGradient>

    <radialGradient id="leaf-dark" cx="30%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#4a7535" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2d5220" stop-opacity="0.7"/>
    </radialGradient>

    <radialGradient id="flower-g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f5e8c8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#e8d4a0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d4b870" stop-opacity="0.7"/>
    </radialGradient>

    <radialGradient id="flower-g2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8ee" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#f0e4c4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d8c890" stop-opacity="0.65"/>
    </radialGradient>

    <radialGradient id="berry-g" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8b6040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5a3820" stop-opacity="0.75"/>
    </radialGradient>

    <radialGradient id="stem-wash" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#4a7535" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2d5220" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Overall composition fade - transparent at bottom-left -->
    <radialGradient id="comp-fade" cx="100%" cy="0%" r="85%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="fade-mask">
      <rect width="900" height="700" fill="url(#comp-fade)"/>
    </mask>
  </defs>

  <g mask="url(#fade-mask)">

    <!-- ═══════════════════════════════════════ -->
    <!-- BACK LAYER — large background leaves -->
    <!-- ═══════════════════════════════════════ -->
    <g filter="url(#watercolor-heavy)" opacity="0.55">
      <!-- Giant back leaf top-right -->
      <path d="M780,0 Q900,80 870,200 Q820,160 750,80 Q700,30 720,-20 Z" fill="url(#leaf-g3)"/>
      <!-- Wide sweep leaf -->
      <path d="M900,50 Q880,180 800,260 Q820,150 840,80 Z" fill="url(#leaf-g4)"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- MID LAYER — primary botanical mass -->
    <!-- ═══════════════════════════════════════ -->

    <!-- Main sweeping branch from top-right -->
    <g filter="url(#watercolor)">
      <!-- Central stem arc -->
      <path d="M900,0 Q820,60 740,140 Q680,200 620,280 Q580,320 550,370"
            fill="none" stroke="#4a7535" stroke-width="3.5" stroke-opacity="0.55" stroke-linecap="round"/>
      <!-- Branch stem left -->
      <path d="M760,110 Q710,130 660,170 Q630,195 600,225"
            fill="none" stroke="#4a7535" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round"/>
      <!-- Branch stem right -->
      <path d="M820,60 Q860,100 880,160 Q890,200 875,240"
            fill="none" stroke="#3d6b30" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
    </g>

    <!-- Large leaves on main stem -->
    <g filter="url(#watercolor)">
      <!-- Leaf 1 — top right, large sweeping -->
      <path d="M840,20 Q920,70 900,160 Q860,120 800,70 Q770,45 800,10 Z"
            fill="url(#leaf-g1)" opacity="0.88"/>
      <!-- Leaf vein -->
      <path d="M820,18 Q870,80 895,155" fill="none" stroke="#3d6b30" stroke-width="1" stroke-opacity="0.3"/>

      <!-- Leaf 2 — upper mid -->
      <path d="M760,60 Q830,40 860,120 Q800,110 740,90 Q710,75 730,50 Z"
            fill="url(#leaf-g2)" opacity="0.82"/>
      <path d="M748,56 Q800,80 855,118" fill="none" stroke="#3d6b30" stroke-width="0.8" stroke-opacity="0.28"/>

      <!-- Leaf 3 — right side drooping -->
      <path d="M890,130 Q940,200 920,290 Q880,240 850,180 Q835,150 860,120 Z"
            fill="url(#leaf-g1)" opacity="0.78"/>
      <path d="M888,133 Q910,200 918,285" fill="none" stroke="#3d6b30" stroke-width="1" stroke-opacity="0.25"/>

      <!-- Leaf 4 — mid center-right -->
      <path d="M720,130 Q790,100 820,180 Q760,185 710,170 Q685,155 698,130 Z"
            fill="url(#leaf-g2)" opacity="0.80"/>

      <!-- Leaf 5 — lower cascade -->
      <path d="M680,185 Q750,160 770,240 Q710,240 665,220 Q645,205 658,182 Z"
            fill="url(#leaf-g3)" opacity="0.75"/>

      <!-- Leaf 6 — reaching left -->
      <path d="M640,220 Q700,190 730,265 Q668,268 635,248 Q618,235 628,215 Z"
            fill="url(#leaf-g1)" opacity="0.72"/>

      <!-- Leaf 7 — small accent top -->
      <path d="M790,10 Q840,-10 860,50 Q820,50 785,35 Q773,22 782,8 Z"
            fill="url(#leaf-dark)" opacity="0.65"/>

      <!-- Leaf 8 — lower right edge -->
      <path d="M880,220 Q930,270 910,350 Q870,300 848,248 Q840,228 862,218 Z"
            fill="url(#leaf-g2)" opacity="0.70"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- FLOWERING BRANCHES — secondary cluster -->
    <!-- ═══════════════════════════════════════ -->
    <g filter="url(#watercolor-soft)">
      <!-- Secondary branch — sweeps lower left -->
      <path d="M660,260 Q610,300 560,360 Q530,395 510,430"
            fill="none" stroke="#4a7535" stroke-width="2" stroke-opacity="0.38" stroke-linecap="round"/>
      <!-- Tertiary branch -->
      <path d="M600,310 Q560,340 530,380"
            fill="none" stroke="#5a8c4a" stroke-width="1.5" stroke-opacity="0.32" stroke-linecap="round"/>

      <!-- Smaller leaves on secondary branch -->
      <path d="M640,255 Q690,235 710,300 Q658,302 630,283 Q615,268 628,252 Z"
            fill="url(#leaf-g3)" opacity="0.68"/>
      <path d="M595,305 Q645,280 660,345 Q610,345 582,328 Q568,313 580,302 Z"
            fill="url(#leaf-g2)" opacity="0.65"/>
      <path d="M550,358 Q598,335 615,398 Q565,398 540,380 Q526,365 540,355 Z"
            fill="url(#leaf-g1)" opacity="0.60"/>

      <!-- Tiny accent leaves -->
      <path d="M730,145 Q758,128 768,165 Q740,168 722,157 Q714,148 722,142 Z"
            fill="url(#leaf-dark)" opacity="0.70"/>
      <path d="M695,200 Q722,183 732,218 Q705,221 688,210 Q680,202 688,197 Z"
            fill="url(#leaf-g4)" opacity="0.65"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- FLOWERS — scattered blooms -->
    <!-- ═══════════════════════════════════════ -->
    <g filter="url(#watercolor-soft)">
      <!-- Flower 1 — upper area, open bloom -->
      <g transform="translate(785, 88)">
        <ellipse cx="0" cy="-14" rx="9" ry="15" fill="url(#flower-g1)" opacity="0.85" transform="rotate(0)"/>
        <ellipse cx="0" cy="-14" rx="9" ry="15" fill="url(#flower-g1)" opacity="0.80" transform="rotate(72)"/>
        <ellipse cx="0" cy="-14" rx="9" ry="15" fill="url(#flower-g1)" opacity="0.78" transform="rotate(144)"/>
        <ellipse cx="0" cy="-14" rx="9" ry="15" fill="url(#flower-g1)" opacity="0.80" transform="rotate(216)"/>
        <ellipse cx="0" cy="-14" rx="9" ry="15" fill="url(#flower-g1)" opacity="0.82" transform="rotate(288)"/>
        <circle cx="0" cy="0" r="7" fill="#d4b870" opacity="0.9"/>
        <circle cx="0" cy="0" r="4" fill="#c9a842" opacity="0.95"/>
      </g>

      <!-- Flower 2 — mid right, smaller -->
      <g transform="translate(868, 185)" opacity="0.82">
        <ellipse cx="0" cy="-11" rx="7" ry="12" fill="url(#flower-g2)" opacity="0.82" transform="rotate(0)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" fill="url(#flower-g2)" opacity="0.78" transform="rotate(60)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" fill="url(#flower-g2)" opacity="0.80" transform="rotate(120)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" fill="url(#flower-g2)" opacity="0.78" transform="rotate(180)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" fill="url(#flower-g2)" opacity="0.80" transform="rotate(240)"/>
        <ellipse cx="0" cy="-11" rx="7" ry="12" fill="url(#flower-g2)" opacity="0.78" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="6" fill="#c9a842" opacity="0.88"/>
        <circle cx="0" cy="0" r="3" fill="#a8882a" opacity="0.9"/>
      </g>

      <!-- Flower 3 — bud on lower branch -->
      <g transform="translate(625, 268)" opacity="0.75">
        <path d="M0,-18 Q8,-8 6,5 Q0,10 -6,5 Q-8,-8 0,-18 Z" fill="url(#flower-g1)" opacity="0.85"/>
        <path d="M0,-18 Q10,-5 8,5 Q0,12 -8,5 Q-10,-5 0,-18 Z" fill="url(#flower-g2)" opacity="0.70" transform="rotate(45)"/>
        <circle cx="0" cy="0" r="5" fill="#d4b870" opacity="0.88"/>
      </g>

      <!-- Flower 4 — small daisy lower left -->
      <g transform="translate(568, 348)" opacity="0.70">
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.80" transform="rotate(0)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.76" transform="rotate(51.4)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.78" transform="rotate(102.8)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.76" transform="rotate(154.2)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.78" transform="rotate(205.6)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.76" transform="rotate(257)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="11" fill="url(#flower-g2)" opacity="0.78" transform="rotate(308.4)"/>
        <circle cx="0" cy="0" r="5" fill="#c9a842" opacity="0.88"/>
      </g>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- BERRIES & SEED PODS -->
    <!-- ═══════════════════════════════════════ -->
    <g filter="url(#watercolor-soft)">
      <!-- Berry cluster 1 -->
      <g opacity="0.78">
        <path d="M748,168 Q760,158 768,168 Q760,180 748,168 Z" fill="#7a9958" stroke="#5a7838" stroke-width="0.5"/>
        <circle cx="748" cy="162" r="5.5" fill="url(#berry-g)" opacity="0.85"/>
        <circle cx="758" cy="158" r="4.5" fill="url(#berry-g)" opacity="0.80"/>
        <circle cx="766" cy="163" r="5" fill="url(#berry-g)" opacity="0.82"/>
        <circle cx="754" cy="155" r="4" fill="url(#berry-g)" opacity="0.75"/>
      </g>

      <!-- Berry cluster 2 — lower branch -->
      <g opacity="0.68" transform="translate(610, 320)">
        <circle cx="0" cy="0" r="4.5" fill="url(#berry-g)"/>
        <circle cx="8" cy="-4" r="4" fill="url(#berry-g)"/>
        <circle cx="14" cy="2" r="4.5" fill="url(#berry-g)"/>
        <circle cx="6" cy="-10" r="3.5" fill="url(#berry-g)"/>
      </g>

      <!-- Seed pods / small buds -->
      <ellipse cx="700" cy="248" rx="4" ry="7" fill="#6a9248" opacity="0.65" transform="rotate(-20,700,248)"/>
      <ellipse cx="706" cy="242" rx="3.5" ry="6" fill="#5a8038" opacity="0.60" transform="rotate(10,706,242)"/>
      <ellipse cx="695" cy="238" rx="3" ry="5.5" fill="#7aa058" opacity="0.58" transform="rotate(-35,695,238)"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- FRONT LAYER — crisp detail leaves -->
    <!-- ═══════════════════════════════════════ -->
    <g filter="url(#watercolor)" opacity="0.9">
      <!-- Foreground large leaf — overlaps everything -->
      <path d="M820,0 Q900,30 905,120 Q860,90 810,50 Q785,25 800,-5 Z"
            fill="url(#leaf-dark)" opacity="0.82"/>
      <path d="M822,2 Q878,55 902,118" fill="none" stroke="#2d5220" stroke-width="1.2" stroke-opacity="0.35"/>

      <!-- Crisp small foreground leaves -->
      <path d="M770,195 Q810,178 822,228 Q783,232 762,215 Q751,202 762,192 Z"
            fill="url(#leaf-g1)" opacity="0.85"/>
      <path d="M776,197 Q808,208 820,226" fill="none" stroke="#3d6b30" stroke-width="0.7" stroke-opacity="0.3"/>

      <!-- Hanging leaf bottom right -->
      <path d="M900,300 Q940,360 918,440 Q882,390 862,340 Q852,315 872,300 Z"
            fill="url(#leaf-g2)" opacity="0.72"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- FINE DETAILS — tendrils & stippling -->
    <!-- ═══════════════════════════════════════ -->
    <g opacity="0.45">
      <!-- Curling tendrils -->
      <path d="M730,200 Q718,195 715,205 Q712,215 722,218" fill="none" stroke="#4a7535" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M680,260 Q668,254 666,264 Q664,274 674,276" fill="none" stroke="#4a7535" stroke-width="1" stroke-linecap="round"/>
      <path d="M635,320 Q622,313 620,325 Q618,337 630,338" fill="none" stroke="#5a8c4a" stroke-width="1" stroke-linecap="round"/>

      <!-- Fine cross veins -->
      <path d="M800,75 Q815,70 818,82" fill="none" stroke="#3d6b30" stroke-width="0.6" stroke-opacity="0.4"/>
      <path d="M808,92 Q822,88 824,100" fill="none" stroke="#3d6b30" stroke-width="0.6" stroke-opacity="0.4"/>
      <path d="M815,110 Q828,106 830,118" fill="none" stroke="#3d6b30" stroke-width="0.6" stroke-opacity="0.35"/>
    </g>

    <!-- Watercolor bloom/wash spots for authenticity -->
    <g filter="url(#bloom)" opacity="0.12">
      <ellipse cx="820" cy="80" rx="80" ry="60" fill="#7aab6a"/>
      <ellipse cx="880" cy="180" rx="50" ry="70" fill="#6a9955"/>
      <ellipse cx="700" cy="200" rx="60" ry="45" fill="#8fba78"/>
      <ellipse cx="630" cy="310" rx="50" ry="40" fill="#78a860"/>
    </g>

  </g>
</svg>
